<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0E0E10" />
    <title>Offline — OOO Performance</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: #0e0e10;
        color: #f5f5f5;
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        max-width: 26rem;
      }
      .mark {
        font-weight: 700;
        letter-spacing: 0.18em;
        font-size: 2.75rem;
        margin: 0;
      }
      .tag {
        font-family: ui-sans-serif, system-ui, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        font-size: 0.625rem;
        color: rgba(245, 245, 245, 0.55);
        margin: 0.75rem 0 2.5rem;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 600;
        line-height: 1.15;
        margin: 0 0 0.75rem;
      }
      p {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 0.95rem;
        line-height: 1.5;
        color: rgba(245, 245, 245, 0.7);
        margin: 0 0 2rem;
      }
      button {
        font-family: ui-sans-serif, system-ui, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.75rem;
        color: #0e0e10;
        background: #f5f5f5;
        border: 0;
        height: 48px;
        padding: 0 28px;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="mark">OOO</p>
      <p class="tag">Performance</p>
      <h1>You're offline.</h1>
      <p>
        This page isn't available without a connection. Check your network and
        try again — anything you've already visited will still load.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
